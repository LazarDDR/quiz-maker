<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="transparent"></rect>

  <!-- Fully black question marks, scalable and repeatable -->
  <text x="10" y="30" font-size="28" fill="#000000">?</text>
  <text x="50" y="20" font-size="28" fill="#000000">?</text>
  <text x="25" y="70" font-size="28" fill="#000000">?</text>
  <text x="70" y="80" font-size="28" fill="#000000">?</text>
</svg>
